# Understand Anything Workflow Add Or Update Language Or Framework Support

## Action

Follow the add-or-update-language-or-framework-support workflow:
1. Add or update language/framework config in packages/core/src/languages/configs/*.ts and/or frameworks/*.ts
2. Update language and framework registry files (language-registry.ts, framework-registry.ts, index.ts)
3. Add or update prompt snippets in skills/understand/languages/*.md and/or frameworks/*.md
4. Update or add tests in packages/core/src/__tests__/
5. Update SKILL.md and related prompt files to inject new snippets or handle new frameworks
6. Optionally update dashboard or documentation to reflect new support

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
